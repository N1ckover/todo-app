<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi To-DO App</title>
</head>
<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<body>

    <h1>Mi To-DO App</h1>

<div class="input-container">
    <input type="text" id="taskInput" placeholder="Escribe una tarea">
    <button id="addBtn">Agregar tarea</button>
</div>

<div class="filters">
    <button id="filterAll">Todas</button>
    <button id="filterCompleted">✔ Completadas</button>
    <button id="filterPending">Pendientes</button>
    <button id="clearAll">🗑 Vaciar</button>
</div>

<ul id="taskList"></ul>
<script src="script.js"></script>
</body>
</html>
